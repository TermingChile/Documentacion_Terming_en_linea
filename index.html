<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TermIng — Repositorio Documental QHSE</title>
    <style>
        /* ─── IMPORTAR FUENTES ─── */
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap');

        /* ─── RESET ─── */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f4f6f9;
            font-family: 'Inter', sans-serif;
            color: #1a2a3a;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ─── HEADER ─── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 3px solid #F29D38;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-family: 'Inter', sans-serif;
            font-size: 28px;
            font-weight: 900;
            color: #2D4E71;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: #F29D38;
        }

        .logo small {
            font-size: 14px;
            font-weight: 600;
            color: #8a9aaa;
            margin-left: 10px;
        }

        .badge-version {
            background: #2D4E71;
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stats {
            display: flex;
            gap: 16px;
            font-size: 14px;
            font-weight: 600;
        }

        .stats .ready {
            color: #2D4E71;
        }
        .stats .pending {
            color: #F29D38;
        }
        .stats .total {
            color: #8a9aaa;
        }

        .btn-drive {
            background: #2D4E71;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background .2s;
        }

        .btn-drive:hover {
            background: #F29D38;
        }

        /* ─── BUSCADOR Y FILTROS ─── */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 28px;
            background: #fff;
            padding: 16px 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(45, 78, 113, 0.08);
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f4f6f9;
            border-radius: 8px;
            padding: 0 12px;
        }

        .search-box input {
            border: none;
            background: transparent;
            padding: 10px 0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            width: 100%;
            color: #1a2a3a;
        }

        .search-box input::placeholder {
            color: #b0b8c4;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: #f4f6f9;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            color: #5a7080;
            cursor: pointer;
            transition: all .2s;
            font-family: 'Inter', sans-serif;
        }

        .filter-btn:hover {
            background: #e8ecf2;
        }

        .filter-btn.active {
            background: #2D4E71;
            color: #fff;
        }

        .filter-btn.active-pending {
            background: #F29D38;
            color: #fff;
        }

        /* ─── SECCIONES ─── */
        .section {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(45, 78, 113, 0.06);
            margin-bottom: 20px;
            overflow: hidden;
            border-left: 4px solid #2D4E71;
        }

        .section-header {
            padding: 16px 24px;
            background: #fafbfc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: background .2s;
            border-bottom: 1px solid #eef0f4;
        }

        .section-header:hover {
            background: #f0f2f5;
        }

        .section-header h2 {
            font-size: 16px;
            font-weight: 700;
            color: #2D4E71;
            letter-spacing: 0.5px;
        }

        .section-header .count {
            font-size: 13px;
            font-weight: 600;
            color: #8a9aaa;
        }

        .section-header .toggle-icon {
            font-size: 18px;
            color: #8a9aaa;
            transition: transform .3s;
        }

        .section-body {
            padding: 0 24px 16px;
            display: none;
        }

        .section-body.open {
            display: block;
        }

        /* ─── TABLA DE DOCUMENTOS ─── */
        .doc-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .doc-table th {
            text-align: left;
            padding: 12px 8px 8px 8px;
            font-size: 11px;
            font-weight: 700;
            color: #8a9aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #eef0f4;
        }

        .doc-table td {
            padding: 10px 8px;
            border-bottom: 1px solid #f0f2f5;
            vertical-align: middle;
        }

        .doc-table tr:last-child td {
            border-bottom: none;
        }

        .doc-table .doc-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            color: #2D4E71;
            white-space: nowrap;
        }

        .doc-table .doc-name {
            font-weight: 500;
            color: #1a2a3a;
        }

        .doc-table .doc-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
        }

        .doc-table .doc-status.ready {
            background: #e3f0e8;
            color: #1a7a4a;
        }

        .doc-table .doc-status.pending {
            background: #fef0e0;
            color: #b06020;
        }

        .doc-table .doc-link {
            color: #2D4E71;
            text-decoration: none;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background .2s;
            font-size: 12px;
        }

        .doc-table .doc-link:hover {
            background: #e8ecf2;
        }

        .doc-table .doc-link.disabled {
            color: #b0b8c4;
            pointer-events: none;
            cursor: default;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .header-right {
                width: 100%;
                justify-content: space-between;
            }
            .controls {
                flex-direction: column;
            }
            .search-box {
                width: 100%;
            }
            .filter-group {
                width: 100%;
                justify-content: flex-start;
            }
            .doc-table {
                font-size: 12px;
            }
            .doc-table th,
            .doc-table td {
                padding: 8px 4px;
            }
            .doc-table .doc-code {
                font-size: 10px;
            }
            .section-header {
                padding: 12px 16px;
                flex-wrap: wrap;
                gap: 8px;
            }
            .section-body {
                padding: 0 16px 12px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 16px 10px;
            }
            .doc-table {
                font-size: 11px;
            }
            .doc-table .doc-status {
                font-size: 10px;
                padding: 2px 8px;
            }
            .doc-table .doc-link {
                font-size: 11px;
                padding: 2px 6px;
            }
            .stats {
                font-size: 12px;
                gap: 10px;
            }
            .logo {
                font-size: 22px;
            }
        }

        /* ─── UTILITY ─── */
        .text-muted {
            color: #8a9aaa;
        }

        /* ─── FOOTER ─── */
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eef0f4;
            text-align: center;
            font-size: 13px;
            color: #8a9aaa;
        }

        .footer strong {
            color: #2D4E71;
        }

        /* ─── SCROLLBAR ─── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f4f6f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #c0c8d4;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a0aab8;
        }

        /* ─── LOADING / ERROR ─── */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #8a9aaa;
            font-size: 16px;
        }
        .loading .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 4px solid #eef0f4;
            border-top-color: #2D4E71;
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error {
            text-align: center;
            padding: 60px 20px;
            color: #c0392b;
            font-size: 16px;
        }
        .error .icon {
            font-size: 40px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

    <div class="container" id="app">

        <!-- ═══ HEADER ═══ -->
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    Term<span>Ing</span>
                    <small>SPA · Chile</small>
                </div>
                <span class="badge-version">v4.0</span>
            </div>
            <div class="header-right">
                <div class="stats">
                    <span class="ready">✅ <span id="countReady">0</span> Listos</span>
                    <span class="pending">⏳ <span id="countPending">0</span> Pendientes</span>
                    <span class="total">📄 <span id="countTotal">0</span> Total</span>
                </div>
                <a href="https://drive.google.com/drive/folders/19rJ6b_tCvMkzYtuIGmipAYSepvvYoY7f?usp=drive_link" target="_blank" class="btn-drive">
                    📁 Ver en Drive
                </a>
            </div>
        </header>

        <!-- ═══ CONTROLES ═══ -->
        <div class="controls">
            <div class="search-box">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="Buscar por código o nombre..." />
            </div>
            <div class="filter-group" id="filterGroup">
                <button class="filter-btn active" data-filter="all">📋 Todos</button>
                <button class="filter-btn" data-filter="ready">✅ Listos</button>
                <button class="filter-btn active-pending" data-filter="pending">⏳ Pendientes</button>
            </div>
        </div>

        <!-- ═══ CONTENEDOR DE SECCIONES ═══ -->
        <div id="sectionsContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>Cargando documentación...</p>
            </div>
        </div>

        <!-- ═══ FOOTER ═══ -->
        <div class="footer">
            <p>
                <strong>TermIng Chile SPA</strong> — Sistema de Gestión QHSE · Documentación Controlada<br>
                <span class="text-muted">Propiedad de TERMING SPA | Reproducción no autorizada prohibida · Ley 19.628</span>
            </p>
        </div>

    </div>

    <script>
        // ═══════════════════════════════════════════════════
        // 1. CARGAR DATOS DESDE JSON EXTERNO
        // ═══════════════════════════════════════════════════

        const container = document.getElementById('sectionsContainer');
        const searchInput = document.getElementById('searchInput');
        const filterButtons = document.querySelectorAll('.filter-btn');

        let documentos = []; // se llenará con fetch
        let currentFilter = 'all';
        let searchTerm = '';

        // Función para actualizar contadores
        function updateCounts(data) {
            let total = 0,
                ready = 0,
                pending = 0;
            data.forEach(cat => {
                cat.items.forEach(doc => {
                    total++;
                    if (doc.status === 'ready') ready++;
                    else pending++;
                });
            });
            document.getElementById('countTotal').textContent = total;
            document.getElementById('countReady').textContent = ready;
            document.getElementById('countPending').textContent = pending;
        }

        // Función para renderizar
        function render() {
            let html = '';
            let anyMatch = false;

            documentos.forEach(category => {
                // Filtrar items
                const filtered = category.items.filter(doc => {
                    const matchSearch = doc.code.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        doc.name.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchFilter = currentFilter === 'all' ||
                        (currentFilter === 'ready' && doc.status === 'ready') ||
                        (currentFilter === 'pending' && doc.status === 'pending');
                    return matchSearch && matchFilter;
                });

                if (filtered.length === 0) return;
                anyMatch = true;

                const totalItems = category.items.length;
                const shownItems = filtered.length;

                html += `
                            <div class="section">
                                <div class="section-header" onclick="toggleSection(this)">
                                    <h2>${category.category}</h2>
                                    <div style="display:flex;align-items:center;gap:12px;">
                                        <span class="count">${shownItems} de ${totalItems}</span>
                                        <span class="toggle-icon">▼</span>
                                    </div>
                                </div>
                                <div class="section-body open">
                                    <table class="doc-table">
                                        <thead>
                                            <tr>
                                                <th style="width:140px;">Código</th>
                                                <th>Documento</th>
                                                <th style="width:110px;">Estado</th>
                                                <th style="width:80px;text-align:center;">PDF</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                            `;

                filtered.forEach(doc => {
                    const statusClass = doc.status === 'ready' ? 'ready' : 'pending';
                    const statusLabel = doc.status === 'ready' ? '✅ Listo' : '⏳ Pendiente';
                    const linkHtml = doc.url && doc.url !== '#URL_DEL_PDF' ?
                        `<a href="${doc.url}" target="_blank" class="doc-link">📄 Ver</a>` :
                        `<span class="doc-link disabled">⏳ Próximo</span>`;

                    html += `
                                <tr>
                                    <td class="doc-code">${doc.code}</td>
                                    <td class="doc-name">${doc.name}</td>
                                    <td><span class="doc-status ${statusClass}">${statusLabel}</span></td>
                                    <td style="text-align:center;">${linkHtml}</td>
                                </tr>
                            `;
                });

                html += `
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        `;
            });

            if (!anyMatch) {
                html = '<p style="text-align:center;padding:40px;color:#8a9aaa;">No se encontraron documentos con esos filtros.</p>';
            }

            container.innerHTML = html;
        }

        // Toggle sección (global)
        window.toggleSection = function(header) {
            const body = header.nextElementSibling;
            const icon = header.querySelector('.toggle-icon');
            if (body.classList.contains('open')) {
                body.classList.remove('open');
                icon.textContent = '▶';
            } else {
                body.classList.add('open');
                icon.textContent = '▼';
            }
        };

        // Cargar datos desde JSON
        async function loadData() {
            try {
                const response = await fetch('documentos.json');
                if (!response.ok) throw new Error(`Error HTTP: ${response.status}`);
                const data = await response.json();
                documentos = data.documentos; // asumiendo que el JSON tiene un array "documentos"

                updateCounts(documentos);
                render();

                // Vincular eventos de búsqueda y filtros después de cargar datos
                searchInput.addEventListener('input', function() {
                    searchTerm = this.value;
                    render();
                });

                filterButtons.forEach(btn => {
                    btn.addEventListener('click', function() {
                        filterButtons.forEach(b => b.classList.remove('active', 'active-pending'));
                        const filter = this.dataset.filter;
                        if (filter === 'all') {
                            this.classList.add('active');
                        } else if (filter === 'ready') {
                            this.classList.add('active');
                        } else if (filter === 'pending') {
                            this.classList.add('active-pending');
                        }
                        currentFilter = filter;
                        render();
                    });
                });

            } catch (error) {
                console.error('Error cargando documentos:', error);
                container.innerHTML = `
                            <div class="error">
                                <div class="icon">⚠️</div>
                                <p>No se pudo cargar la documentación.</p>
                                <p style="font-size:14px;color:#8a9aaa;margin-top:8px;">${error.message}</p>
                                <p style="font-size:13px;color:#8a9aaa;margin-top:8px;">
                                    Verifica que el archivo <strong>documentos.json</strong> exista en el mismo directorio.
                                </p>
                            </div>
                        `;
            }
        }

        // Iniciar carga
        loadData();
    </script>

</body>
</html>
